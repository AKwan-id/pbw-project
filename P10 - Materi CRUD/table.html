<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Table</h1>
    <table border="1" cellspacing="0" cellpadding="10" width="100">
        <tr>
            <td colspan="2">Cell 1,1</td>
            <td rowspan="3">Cell 1,3</td>
            <td>Cell 1,4</td>
        </tr>
        <tr>
            <td>Cell 2,1</td>
            <td rowspan="2">Cell 2,2</td>

            <td>Cell 2,4</td>
        </tr>
        <tr>
            <td>Cell 3,1</td>

            <td>Cell 3,4</td>
        </tr>
    </table>
</body>
</html>
